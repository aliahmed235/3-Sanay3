spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sany3_db}?serverTimezone=UTC&zeroDateTimeBehavior=CONVERT_TO_NULL
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 60000
      max-lifetime: 300000
      auto-commit: false

  flyway:
    repair-on-migrate: true
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 5
        connection:
          provider_disables_autocommit: true

  devtools:
    restart:
      enabled: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 12MB

cloudinary:
  url: ${CLOUDINARY_URL:}

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiry: 604800000
  refresh-token-expiry: 604800000

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

logging:
  level:
    root: ERROR
    com.sany3: INFO
    org.springframework.web: ERROR
    org.springframework.security: ERROR
