spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sany3_db}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:Aa0552635037#}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 10

jwt:
  secret: ${JWT_SECRET:mySecretKeyForSanay3ApplicationThatIsLongEnoughForHS256}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

logging:
  level:
    root: WARN
    com.sany3: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN