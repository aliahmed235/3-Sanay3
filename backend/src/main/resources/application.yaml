spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sany3_db}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 900000
      auto-commit: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc:
          batch_size: 5
          lob:
            non_contextual_creation: true
        connection:
          provider_disables_autocommit: false

  flyway:
    enabled: false

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

logging:
  level:
    root: WARN
    com.sany3: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN