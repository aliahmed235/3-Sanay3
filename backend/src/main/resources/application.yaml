spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sany3_db}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:Aa0552635037#}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:mySecretKeyForSanay3ApplicationThatIsLongEnoughForHS256}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

logging:
  level:
    root: INFO
    com.sanay3: DEBUG
    org.springframework.security: DEBUG