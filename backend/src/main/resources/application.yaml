spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sany3_db}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:Aa0552635037#}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000

  flyway:
    enabled: true
    baselineOnMigrate: true
    baselineVersion: 0
    locations: classpath:db/migration
    validateOnMigrate: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 10

jwt:
  secret: ${JWT_SECRET:mySecretKeyForSanay3ApplicationThatIsLongEnoughForHS256}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

logging:
  level:
    root: WARN
    com.sany3: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN